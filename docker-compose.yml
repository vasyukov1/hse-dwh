services:
  postgres-master:
    container_name: postgres-master
    image: postgres:17
    restart: always
    ports:
      - "${POSTGRES_MASTER_PORT}:5432"
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MASTER_PORT: ${POSTGRES_MASTER_PORT}
    volumes:
      - ./postgres-master-data:/var/lib/postgresql/data                             # data
      - ./postgres-replica-data:/var/lib/postgresql/postgres-replica-data           # replica
      - ./migrations:/docker-entrypoint-initdb.d:ro                                 # migrations
      - ./init-script:/etc/postgresql/init-script                                   # init
      - ./init-script/common-config/postgresql.conf:/etc/postgresql/postgresql.conf # config
      - ./init-script/common-config/pg_hba.conf:/etc/postgresql/pg_hba.conf         # access
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - postgres-network

  postgres-replica:
    container_name: postgres-replica
    image: postgres:17
    restart: always
    ports:
      - "${POSTGRES_REPLICA_PORT}:5432"
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_REPLICA_PORT: ${POSTGRES_REPLICA_PORT}
    volumes:
      - ./postgres-replica-data:/var/lib/postgresql/data                            # data
      - ./init-script/common-config/pg_hba.conf:/etc/postgresql/pg_hba.conf         # access
    networks:
      - postgres-network

  postgres-dwh:
    container_name: postgres-dwh
    image: postgres:17
    restart: always
    ports:
      - "${POSTGRES_DWH_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DWH_DB}
    volumes:
      - ./postgres-dwh-data:/varlib/postgresql/data
      - ./dwh/ddl:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DWH_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - postgres-network

  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
    networks:
      - postgres-network
  
  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - postgres-network


networks:
  postgres-network:
    driver: bridge
